apiVersion: v1
kind: Namespace
metadata:
  name: hachigan-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: hachigan-demo
  labels:
    app.kubernetes.io/name: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo
      component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo
        component: api
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-api
  namespace: hachigan-demo
  labels:
    app.kubernetes.io/name: demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 80

